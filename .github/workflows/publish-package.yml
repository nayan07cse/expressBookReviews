name: Publish GitHub Package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: express-book-reviews

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://npm.pkg.github.com
          scope: "@nayan07cse"
          cache: npm
          cache-dependency-path: express-book-reviews/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm test

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
