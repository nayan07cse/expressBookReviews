name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: express-book-reviews

    strategy:
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: express-book-reviews/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm test

      - name: Smoke test API
        run: |
          npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 3
          curl --fail http://localhost:5000/
          curl --fail http://localhost:5000/isbn/4
          curl --fail http://localhost:5000/author/Jane%20Austen
          curl --fail http://localhost:5000/title/Pride%20and%20Prejudice
